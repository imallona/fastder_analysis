# Project-wide configuration for fastder-evaluation

# Reproducibility
seed: 10  # Global random seed
cores: 8  # Global CPU core count

# ASimulatoR simulation
asimulator:
  seq_depth: 100000000  # Reads per sample (100 million)
  multi_events_per_exon: false
  strand_specific: true
  probs_as_freq: true   # Treat event_probs values as frequencies

  # Experimental design: one entry per sample, with its AS event distribution.
  samples:
    es:
      es: 1.0
    mes:
      mes: 1.0
    afe:
      afe: 1.0
    ale:
      ale: 1.0
    mixed:
      es: 0.25
      mes: 0.25
      afe: 0.25
      ale: 0.25

# Monorail (recount-pump + recount-unify)
monorail:
  # Reference genome name, must match the downloaded pump and unify refs
  # Supported: hg38, grcm38
  ref_version: hg38

  # Project name should be unique for your organization or 'sra' if you're pulling from the Sequence Read Archive.
  # The project_id should be between 100 and 250 (exclusive).
  project_name: "local"
  project_id: 101

  # Input source for the pump step.
  # asimulator: use FASTQ files produced by run_asimulator (local simulated data)
  # sra:        download from SRA at run time; requires sra_samples below
  pump_source: asimulator

  # Required when pump_source is sra. Maps sample ID to SRA accessions.
  # sra_samples:
  #   SRR390728:
  #     study_acc: SRP020237

# Parameter grid: every combination of the listed values will be run.
# Omit a parameter entirely to use fastder's internal default.
# Defaults: min_coverage=0.05, min_length=10, position_tolerance=5, coverage_tolerance=0.8
fastder:
  min_coverage: [0.001, 0.01]
  # min_length: [5, 10]
  # position_tolerance: [5, 10]
  # coverage_tolerance: [0.1, 0.8]
  # chromosomes: []  # restrict to specific chromosomes (omit for all)

# gffcompare: compare fastder results against reference annotations
gffcompare:
  # For asimulator pump_source: per-sample splicing_variants.gff3 is used automatically.
  # For sra pump_source: set this to the path of your reference annotation (GTF/GFF3).
  reference_annotation: ""  # e.g., "data/reference/Homo_sapiens_GRCh38_Ensembl115/Homo_sapiens.GRCh38.115.gtf"
