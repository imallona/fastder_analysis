# Real-data config: GTEx multi-tissue structural concordance showcase.
#
# Demonstrates that the shape of expressed regions, not just their
# abundance, carries tissue identity. Each tissue is split into 8 disjoint
# sample sub-groups; fastder is run once per sub-group (recount3 gtex data
# source, no alignment), giving 8 expressed-region catalogs per tissue.
# The report clusters the 32 catalogs on expressed-region structure: the
# sub-groups of a tissue should group together, which is the concordance.
#
# Run with:
#   FASTDER_EVAL_CONFIG=../config/config_gtex_concordance.yaml \
#     snakemake --use-conda --cores 12

seed: 10
cores: 12

monorail:
  ref_version: hg38
  project_name: "recount3"
  project_id: 103
  backend: recount3

recount3:
  # data_source selects the recount3 collection: sra (default) or gtex.
  data_source: gtex
  base_url: "https://duffel.rail.bio/recount3"
  metadata_url: "https://duffel.rail.bio/recount3"
  # Each group is one tissue sub-group: study is the tissue's recount3
  # project, samples are 5 recount3 external_ids. Sub-groups of a tissue
