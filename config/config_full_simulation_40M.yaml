# Depth-sweep config: 40M reads per sample.
# Generated by scripts/make_sim_configs.py from
# config_full_simulation.yaml. Edit that script, not this file.

# Paper-ready simulation config: the default, full-depth simulation run.
# 5 samples, 10M reads each, chr21, monorail_light backend (lean STAR plus
# Python aggregator, so no Singularity image pulls and no whole-genome
# reference download). The fastder parameter grid below is the one used for
# the paper figures.
#
# This is the 10M point of the depth sweep. The other depths are generated
# from this file by scripts/make_sim_configs.py as config_full_simulation_5M
# .yaml and so on. Run them with the Makefile (make simulations).
#
#   FASTDER_EVAL_CONFIG=../config/config_full_simulation.yaml \
#     snakemake --use-conda --use-singularity --cores 12

seed: 10
cores: 12

asimulator:
  seq_depth: 40000000  # 40M reads per sample
  multi_events_per_exon: false
  strand_specific: true
  probs_as_freq: true

  samples:
    es:
      es: 1.0
    mes:
      mes: 1.0
    afe:
      afe: 1.0
    ale:
      ale: 1.0
    mixed:
      es: 0.25
      mes: 0.25
      afe: 0.25
      ale: 0.25

monorail:
  backend: monorail_light
  ref_version: hg38
  project_name: "local"
  project_id: 101
  pump_source: asimulator

fastder:
  stranded: false
  # Final-run parameter grid: the cross-product is 2 x 2 x 4 = 16 fastder
  # runs per scenario. position_tolerance is swept so the fastder pt vs
  # derfinder maxregiongap comparison in the report has data. pt0 keeps the
  # degenerate "no stitching" corner; pt5 is fastder's default; pt10 and pt20
  # extend the range, since stitching only engages once pt exceeds the gap
  # between a coverage-derived ER edge and the true splice site.
  min_coverage: [0.01, 0.05]
  min_length: [10, 25]
  position_tolerance: [0, 5, 10, 20]
  chromosomes: ["chr21"]

grohmm:
  # 4 x 2 = 8 combos, matching derfinder's 8-combo grid for a fair
  # comparison. LtProbB sweeps HMM strictness (groHMM default -200;
  # TAR-scRNA-seq used the [-100, -300] range on RNA-seq). UTS varies
  # the untranscribed-state variance (default 5; TAR-scRNA-seq used up
  # to 25 on noisier data, so [5, 10] covers the default and 2x default).
  ltprobb: [-100, -200, -300, -500]
  uts: [5, 10]

gffcompare:
  reference_annotation: ""
