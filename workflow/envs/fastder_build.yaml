name: fastder_build
channels:
  - conda-forge
dependencies:
  - cmake >=4.0
  - make
  - gcc_linux-64 =14
  - gxx_linux-64 =14
  - sysroot_linux-64 >=2.17
  - pthread-stubs
  # libBigWig is fetched at configure time by fastder's CMake. It needs zlib
  # and libcurl headers and libraries available at build time.
  - zlib
  - libcurl